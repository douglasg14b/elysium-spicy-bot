# Reusable: generate / revise implementation plan on the ai/issue-N branch.
name: Jarvis plan

on:
  workflow_call:
    inputs:
      discussion_number:
        required: true
        type: string
      discussion_kind:
        required: true
        type: string
      plan_is_feedback:
        required: true
        type: string

jobs:
  plan:
    name: Generate implementation plan
    runs-on: ubuntu-latest
    env:
      # Optional override: set repo variable GITHUB_PLAN_DEBUG to 0/false/off to silence [github-plan:debug]. Unset = default on (see github-plan-cli/src/plan/planDebug.ts).
      GITHUB_PLAN_DEBUG: ${{ vars.GITHUB_PLAN_DEBUG }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git identity for github-actions bot
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge default branch into plan branch when remote exists
        env:
          DISCUSSION_NUMBER: ${{ inputs.discussion_number }}
          DISCUSSION_KIND: ${{ inputs.discussion_kind }}
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch }}"
          plan_branch="$(pnpm exec tsx github-plan-cli/src/cli.ts branch print --kind "$DISCUSSION_KIND" --number "$DISCUSSION_NUMBER")"
          git fetch origin
          if git rev-parse --verify "origin/${plan_branch}" >/dev/null 2>&1; then
            git checkout -B "$plan_branch" "origin/${plan_branch}"
            git merge --no-edit "origin/${default_branch}"
            max_push=6
            attempt=1
            while true; do
              if git push origin "$plan_branch"; then
                break
              fi
              if [ "$attempt" -ge "$max_push" ]; then
                echo "git push failed after ${max_push} attempts" >&2
                exit 1
              fi
              sleep $((attempt * 2))
              attempt=$((attempt + 1))
              git fetch origin
              if ! git pull --rebase origin "$plan_branch"; then
                echo "::error::git pull --rebase failed (conflicts or dirty state). Fix branch ${plan_branch} and re-run." >&2
                exit 1
              fi
            done
          fi

      - name: Install agent CLI (Cursor)
        run: bash scripts/jarvis-cursor-agent-install.sh

      - name: Generate plan and push branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ inputs.discussion_number }}
          DISCUSSION_KIND: ${{ inputs.discussion_kind }}
          PLAN_IS_FEEDBACK: ${{ inputs.plan_is_feedback }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          JARVIS_API_KEY: ${{ secrets.JARVIS_API_KEY }}
          JARVIS_AGENT_MODEL: auto
          # 1 hour max before SIGTERM/SIGKILL on a hung agent.
          JARVIS_AGENT_TIMEOUT_MS: 3600000
        run: pnpm github-plan plan generate

      - name: Comment on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ inputs.discussion_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: pnpm github-plan issue comment --preset workflow-failed
