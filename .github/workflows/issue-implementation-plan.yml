# Generates an implementation plan from a GitHub issue or pull request via Jarvis (agent CLI).
# Runs on issue/PR comments when the comment mentions "jarvis" (word boundary).

name: Issue implementation plan (Jarvis)

run-name: "Plan discussion ${{ github.event.issue.number }}"

on:
  issue_comment:
    types: [created]

concurrency:
  group: plan-discussion-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  create-plan:
    name: Detect intent and create implementation plan
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate (Jarvis mention) and discussion context
        id: context
        run: pnpm github-plan thread gate

      - name: Stop when comment does not mention Jarvis
        if: steps.context.outputs.should_continue != 'true'
        run: echo "Comment did not mention jarvis; skipping."

      - name: Verify actor has repository write access
        id: auth
        if: steps.context.outputs.should_continue == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm github-plan auth assert-write

      - name: Reply when actor is unauthorized
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
        run: pnpm github-plan issue comment --preset unauthorized

      - name: Resolve intent from comment
        id: intent
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          DISCUSSION_KIND: ${{ steps.context.outputs.discussion_kind }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Plan CLI debug logs default on everywhere (github-plan-cli/src/plan/planDebug.ts). Set repo var GITHUB_PLAN_DEBUG=0 to silence.
          GITHUB_PLAN_DEBUG: ${{ vars.GITHUB_PLAN_DEBUG }}
        run: pnpm github-plan classify intent

      - name: Reply when intent is not plan
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true' && steps.intent.outputs.run_plan != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          PLAN_INTENT: ${{ steps.intent.outputs.intent }}
        run: pnpm github-plan issue comment --preset non-plan

      - name: Configure Git identity for github-actions bot
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true' && steps.intent.outputs.run_plan == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Before planning, bring an existing ai/issue-N / ai/pr-N branch up to date with the default
      # branch so revises match the current tree (CI checkout + agent see the same files as main).
      - name: Merge default branch into plan branch when remote exists
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true' && steps.intent.outputs.run_plan == 'true'
        env:
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          DISCUSSION_KIND: ${{ steps.context.outputs.discussion_kind }}
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch }}"
          plan_branch="$(pnpm exec tsx github-plan-cli/src/cli.ts branch print --kind "$DISCUSSION_KIND" --number "$DISCUSSION_NUMBER")"
          git fetch origin
          if git rev-parse --verify "origin/${plan_branch}" >/dev/null 2>&1; then
            git checkout -B "$plan_branch" "origin/${plan_branch}"
            git merge --no-edit "origin/${default_branch}"
            git push origin "$plan_branch"
          fi

      # Optional: set repo Actions variable JARVIS_INSTALL_SCRIPT_SHA256 to pin install script integrity (sha256sum format).
      # Installs Cursor's `agent` binary (under ~/.cursor/bin) for plan generation only.
      - name: Install agent CLI (Cursor)
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true' && steps.intent.outputs.run_plan == 'true'
        env:
          CURSOR_CLI_INSTALL_URL: https://cursor.com/install
          JARVIS_INSTALL_SCRIPT_SHA256: ${{ vars.JARVIS_INSTALL_SCRIPT_SHA256 }}
        run: |
          set -euo pipefail
          script=/tmp/jarvis-agent-install.sh
          curl -fsSL "$CURSOR_CLI_INSTALL_URL" -o "$script"
          if [ -n "${JARVIS_INSTALL_SCRIPT_SHA256:-}" ]; then
            echo "${JARVIS_INSTALL_SCRIPT_SHA256}  ${script}" | sha256sum -c -
          fi
          bash "$script"
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"
          agent --version

      - name: Generate plan and push branch
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true' && steps.intent.outputs.run_plan == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          DISCUSSION_KIND: ${{ steps.context.outputs.discussion_kind }}
          PLAN_IS_FEEDBACK: ${{ steps.intent.outputs.plan_is_feedback }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          JARVIS_API_KEY: ${{ secrets.JARVIS_API_KEY }}
          JARVIS_AGENT_MODEL: auto
          GITHUB_PLAN_DEBUG: ${{ vars.GITHUB_PLAN_DEBUG }}
          # Optional: GITHUB_PLAN_AGENT_STREAM_VERBOSE=1 — extra per-event JSON on stderr (redacted).
        run: pnpm github-plan plan generate

      - name: Comment on failure
        if: failure() && steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: pnpm github-plan issue comment --preset workflow-failed
