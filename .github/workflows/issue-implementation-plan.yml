# Jarvis: routes issue/PR comments (Jarvis mention) to plan generation or implementation workflows.
name: Issue implementation plan (Jarvis)

run-name: "Jarvis ${{ github.event.issue.number }}"

on:
  issue_comment:
    types: [created]

# Do not cancel in-flight runs: a new comment could stop work mid-push and leave branch/thread state inconsistent.
concurrency:
  group: plan-discussion-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  jarvis-intent:
    name: Detect intent
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' && github.actor != 'github-actions[bot]'
    env:
      # Unset → github-plan-cli default (debug on). Set repo var to 0/false/off to quiet.
      GITHUB_PLAN_DEBUG: ${{ vars.GITHUB_PLAN_DEBUG }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      should_continue: ${{ steps.context.outputs.should_continue }}
      authorized: ${{ steps.auth.outputs.authorized }}
      discussion_number: ${{ steps.context.outputs.discussion_number }}
      discussion_kind: ${{ steps.context.outputs.discussion_kind }}
      intent: ${{ steps.intent.outputs.intent }}
      run_plan: ${{ steps.intent.outputs.run_plan }}
      plan_is_feedback: ${{ steps.intent.outputs.plan_is_feedback }}
      has_existing_plan: ${{ steps.intent.outputs.has_existing_plan }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate (Jarvis mention) and discussion context
        id: context
        run: pnpm github-plan thread gate

      - name: Stop when comment does not mention Jarvis
        if: steps.context.outputs.should_continue != 'true'
        run: echo "Comment did not mention jarvis; skipping."

      - name: Verify actor has repository write access
        id: auth
        if: steps.context.outputs.should_continue == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm github-plan auth assert-write

      - name: Reply when actor is unauthorized
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
        run: pnpm github-plan issue comment --preset unauthorized

      - name: Resolve intent from comment
        id: intent
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          DISCUSSION_KIND: ${{ steps.context.outputs.discussion_kind }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm github-plan classify intent

      - name: Reply when implement requested but no plan exists on branch
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true' && steps.intent.outputs.intent == 'implement' && steps.intent.outputs.has_existing_plan != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
        run: pnpm github-plan issue comment --preset implement-no-plan

      - name: Reply when intent is not plan and not implement
        if: steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true' && steps.intent.outputs.run_plan != 'true' && steps.intent.outputs.intent != 'implement'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          PLAN_INTENT: ${{ steps.intent.outputs.intent }}
        run: pnpm github-plan issue comment --preset non-plan

      - name: Comment on failure (intent job)
        if: failure() && steps.context.outputs.should_continue == 'true' && steps.auth.outputs.authorized == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCUSSION_NUMBER: ${{ steps.context.outputs.discussion_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: pnpm github-plan issue comment --preset workflow-failed-intent

  jarvis-plan:
    name: Run plan workflow
    needs: jarvis-intent
    if: needs.jarvis-intent.outputs.should_continue == 'true' && needs.jarvis-intent.outputs.authorized == 'true' && needs.jarvis-intent.outputs.run_plan == 'true'
    uses: ./.github/workflows/jarvis-plan.yml
    with:
      discussion_number: ${{ needs.jarvis-intent.outputs.discussion_number }}
      discussion_kind: ${{ needs.jarvis-intent.outputs.discussion_kind }}
      plan_is_feedback: ${{ needs.jarvis-intent.outputs.plan_is_feedback }}
    secrets: inherit

  jarvis-implement:
    name: Run implement workflow
    needs: jarvis-intent
    if: needs.jarvis-intent.outputs.should_continue == 'true' && needs.jarvis-intent.outputs.authorized == 'true' && needs.jarvis-intent.outputs.intent == 'implement' && needs.jarvis-intent.outputs.has_existing_plan == 'true'
    uses: ./.github/workflows/jarvis-implement.yml
    with:
      discussion_number: ${{ needs.jarvis-intent.outputs.discussion_number }}
      discussion_kind: ${{ needs.jarvis-intent.outputs.discussion_kind }}
    secrets: inherit
